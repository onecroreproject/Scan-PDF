{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- Configuration Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="space-y-3">
                <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Identity Category</label>
                <div class="relative group">
                    <select id="type-select" 
                        class="w-full px-6 py-4.5 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 appearance-none cursor-pointer">
                        <option value="person">Natural Persons 👤</option>
                        <option value="company">Corporate Entities 🏢</option>
                        <option value="location">Geographic Places 🌍</option>
                    </select>
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 text-surface-300 group-hover:text-brand-500 transition-colors pointer-events-none">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>
            
            <div id="gender-group" class="space-y-3">
                <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Gender Bias</label>
                <div class="relative group">
                    <select id="gender-select" 
                        class="w-full px-6 py-4.5 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 appearance-none cursor-pointer">
                        <option value="both">Balanced 🚻</option>
                        <option value="male">Masculine ♂️</option>
                        <option value="female">Feminine ♀️</option>
                    </select>
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 text-surface-300 group-hover:text-brand-500 transition-colors pointer-events-none">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quantity Selection -->
        <div class="space-y-4">
            <div class="flex items-center justify-between px-1">
                <label class="text-[11px] font-black text-surface-400 uppercase tracking-widest">Number of Names</label>
                <span id="count-val" class="px-3 py-1 rounded-lg bg-brand-50 text-brand-700 text-sm font-black font-mono shadow-sm border border-brand-100">10</span>
            </div>
            <div class="relative py-2">
                <input type="range" id="count-range" min="1" max="50" value="10" 
                       class="w-full h-2 bg-surface-100 rounded-lg appearance-none cursor-pointer accent-brand-600">
                <div class="flex justify-between mt-2 text-[10px] font-bold text-surface-300 uppercase tracking-tighter">
                    <span>1</span>
                    <span>50</span>
                </div>
            </div>
        </div>

        <button id="generate-btn" 
            class="w-full py-3 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-base uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
            Generate Names
        </button>

        <!-- Result Area (Initially Hidden) -->
        <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50 animate-fade-in-up">
            <div id="names-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                <!-- Names injected here -->
            </div>
            
            <div class="flex justify-center">
                <button id="copy-all-btn" class="inline-flex items-center justify-center gap-2.5 px-10 py-4 rounded-2xl bg-surface-900 text-white font-black text-xs uppercase tracking-widest hover:bg-black transition-all shadow-xl shadow-surface-900/10 active:scale-95">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    Copy All Names
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Name Card Template -->
<template id="name-template">
    <div class="px-5 py-4 rounded-2xl bg-surface-50 border border-surface-100 flex items-center justify-between group hover:bg-white hover:border-brand-500 hover:shadow-lg transition-all cursor-default">
        <span class="name-display text-sm font-black text-surface-900 tracking-tight"></span>
        <button onclick="copySingleName(this)" class="opacity-0 group-hover:opacity-100 p-2 rounded-xl bg-brand-50 text-brand-600 hover:bg-brand-600 hover:text-white transition-all shadow-sm" title="Copy Name">
            <i data-lucide="copy" class="w-4 h-4"></i>
        </button>
    </div>
</template>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "name-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), selectRange = document.getElementById('count-range'), countVal = document.getElementById('count-val');
    const typeSelect = document.getElementById('type-select'), genderSelect = document.getElementById('gender-select'), genderGroup = document.getElementById('gender-group');
    const result = document.getElementById('result-area'), grid = document.getElementById('names-grid'), temp = document.getElementById('name-template');
    const copyAllBtn = document.getElementById('copy-all-btn');

    selectRange.oninput = () => countVal.innerText = selectRange.value;
    typeSelect.onchange = () => genderGroup.style.display = (typeSelect.value === 'person') ? 'block' : 'none';

    btn.addEventListener('click', async () => {
        btn.disabled = true; 
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> CURATING...';
        
        try {
            const fd = new FormData(); 
            fd.append('count', selectRange.value); 
            fd.append('gender', genderSelect.value); 
            fd.append('category', typeSelect.value); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json(); 
            if (!r.ok) throw new Error(d.error || 'Failed to generate names.');
            
            grid.innerHTML = ''; 
            d.result.forEach(n => {
                const clone = temp.content.cloneNode(true); 
                clone.querySelector('.name-display').innerText = n; 
                grid.appendChild(clone);
            });
            
            result.classList.remove('hidden'); 
            result.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch(err) { 
            alert(err.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = originalHtml; 
            lucide.createIcons(); 
        }
    });

    window.copySingleName = (el) => {
        const text = el.parentElement.querySelector('.name-display').innerText; 
        navigator.clipboard.writeText(text);
        const originalIcon = el.innerHTML; 
        el.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>'; 
        lucide.createIcons();
        setTimeout(() => { el.innerHTML = originalIcon; lucide.createIcons(); }, 1500);
    };

    copyAllBtn.onclick = () => {
        const names = Array.from(grid.querySelectorAll('.name-display')).map(s => s.innerText).join('\n');
        navigator.clipboard.writeText(names); 
        const originalText = copyAllBtn.innerHTML;
        copyAllBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> COPIED TO CLIPBOARD!'; 
        setTimeout(() => { copyAllBtn.innerHTML = originalText; lucide.createIcons(); }, 2000);
        lucide.createIcons();
    };

    typeSelect.onchange(); 
    lucide.createIcons();
</script>
{% endblock %}
