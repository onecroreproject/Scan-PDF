{% extends 'converter/base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen pt-24 sm:pt-32 pb-12 sm:pb-20 relative">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50"></div>
    <div class="absolute -bottom-32 -right-32 w-[500px] h-[500px] bg-teal-100/30 rounded-full blur-[100px]"></div>
    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <nav class="flex items-center justify-center gap-1.5 text-xs sm:text-sm mb-6 sm:mb-10 text-center">
            <a href="{% url 'converter:home' %}" class="text-surface-400 hover:text-brand-600 transition-colors flex items-center gap-1.5"><i data-lucide="home" class="w-3 h-3"></i> Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-surface-300"></i>
            <span class="text-surface-700 font-medium tracking-tight">Name Generator</span>
        </nav>
        <div class="mb-10 sm:mb-16">
            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl sm:rounded-[2rem] bg-gradient-to-br from-teal-400 to-cyan-600 flex items-center justify-center shadow-2xl mx-auto mb-6 transform hover:rotate-2 transition-all duration-300 group">
                <i data-lucide="user-plus" class="w-8 h-8 sm:w-10 sm:h-10 text-white group-hover:scale-110 transition-transform"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-surface-900 tracking-tight">Random Name Generator</h1>
            <p class="text-surface-500 text-xs sm:text-sm mt-2 max-w-sm mx-auto">Generate hundreds of names for people, companies, or even locations in seconds.</p>
        </div>
        <div class="rounded-2xl sm:rounded-3xl bg-white border border-surface-100 p-6 sm:p-10 shadow-card max-w-lg mx-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-surface-400 uppercase tracking-widest text-left ml-1">Type</label>
                    <div class="relative group">
                        <select id="type-select" class="w-full px-5 py-4 rounded-2xl border-2 border-surface-100 text-sm font-bold bg-surface-50 appearance-none focus:border-teal-400 focus:bg-white outline-none transition-all cursor-pointer">
                            <option value="person">Person 👤</option>
                            <option value="company">Company 🏢</option>
                            <option value="location">Location 🌍</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-surface-400 pointer-events-none group-focus-within:text-teal-500 transition-colors"><i data-lucide="chevron-down" class="w-5 h-5"></i></div>
                    </div>
                </div>
                <div id="gender-group" class="space-y-2">
                    <label class="block text-xs font-bold text-surface-400 uppercase tracking-widest text-left ml-1">Gender</label>
                    <div class="relative group">
                        <select id="gender-select" class="w-full px-5 py-4 rounded-2xl border-2 border-surface-100 text-sm font-bold bg-surface-50 appearance-none focus:border-teal-400 focus:bg-white outline-none transition-all cursor-pointer">
                            <option value="both">Both genders 🚻</option>
                            <option value="male">Male ♂️</option>
                            <option value="female">Female ♀️</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-surface-400 pointer-events-none group-focus-within:text-teal-500 transition-colors"><i data-lucide="chevron-down" class="w-5 h-5"></i></div>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 space-y-2">
                <label class="block text-xs font-bold text-surface-400 uppercase tracking-widest text-left ml-1">Quantity</label>
                <div class="flex items-center gap-4 py-2 px-1">
                    <input type="range" id="count-range" min="1" max="50" value="10" class="w-full h-2 rounded-lg bg-surface-100 accent-teal-500 cursor-pointer appearance-none outline-none ring-offset-2 focus:ring-2 focus:ring-teal-100">
                    <span id="count-val" class="px-2 py-0.5 rounded-lg bg-teal-100 text-teal-700 text-xs font-bold font-mono min-w-[32px]">10</span>
                </div>
            </div>

            <button id="generate-btn" class="w-full mt-8 py-4.5 rounded-2xl bg-gradient-to-r from-teal-500 to-cyan-600 text-white font-bold text-sm tracking-wide shadow-xl shadow-teal-500/20 hover:opacity-95 hover:scale-[1.01] active:translate-y-0 hover:-translate-y-px transition-all flex items-center justify-center gap-3">
                <i data-lucide="sparkles" class="w-5 h-5 text-white/50"></i> GENERATE NAMES
            </button>

            <!-- Result Area -->
            <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50 animate-fade-in-up">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-left">
                    <template id="name-template">
                        <div class="px-4 py-3 rounded-xl bg-surface-50 border border-surface-100 text-sm font-bold text-surface-800 flex items-center justify-between group hover:bg-teal-50 hover:border-teal-100 transition-colors">
                            <span class="name-display">Name</span>
                            <button onclick="copyText(this)" class="opacity-0 group-hover:opacity-100 p-1 rounded-lg hover:bg-teal-100 text-teal-600 transition-all"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </template>
                    <div id="names-grid" class="sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
                </div>
                <button id="copy-all-btn" class="mt-8 px-6 py-3.5 rounded-2xl bg-teal-100 text-teal-700 font-bold text-xs hover:bg-teal-200 transition-all flex items-center justify-center gap-2 mx-auto"><i data-lucide="copy" class="w-4 h-4"></i> COPY ALL NAMES</button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "name-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), selectCount = document.getElementById('count-range'), countVal = document.getElementById('count-val');
    const typeSelect = document.getElementById('type-select'), genderSelect = document.getElementById('gender-select'), genderGroup = document.getElementById('gender-group');
    const result = document.getElementById('result-area'), grid = document.getElementById('names-grid'), temp = document.getElementById('name-template');
    const copyAllBtn = document.getElementById('copy-all-btn');

    selectCount.oninput = () => countVal.innerText = selectCount.value;
    typeSelect.onchange = () => genderGroup.style.display = (typeSelect.value === 'person') ? 'block' : 'none';

    btn.addEventListener('click', async () => {
        btn.disabled = true; btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> Generating...';
        try {
            const fd = new FormData(); fd.append('count', selectCount.value); fd.append('gender', genderSelect.value); fd.append('category', typeSelect.value); fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json(); if (!r.ok) throw new Error(d.error || 'Failed');
            grid.innerHTML = ''; d.result.forEach(n => {
                const clone = temp.content.cloneNode(true); clone.querySelector('.name-display').innerText = n; grid.appendChild(clone);
            });
            result.classList.remove('hidden'); result.scrollIntoView({ behavior: 'smooth' });
        } catch(err) { alert(err.message); }
        finally { btn.disabled = false; btn.innerHTML = '<i data-lucide="sparkles" class="w-5 h-5 text-white/50"></i> GENERATE NAMES'; lucide.createIcons(); }
    });

    window.copyText = (el) => {
        const t = el.parentElement.querySelector('.name-display').innerText; navigator.clipboard.writeText(t);
        const originalIcon = el.innerHTML; el.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i>'; lucide.createIcons();
        setTimeout(() => { el.innerHTML = originalIcon; lucide.createIcons(); }, 1500);
    };

    copyAllBtn.onclick = () => {
        const names = Array.from(grid.querySelectorAll('.name-display')).map(s => s.innerText).join('\n');
        navigator.clipboard.writeText(names); copyAllBtn.innerText = 'COPIED TO CLIPBOARD!'; setTimeout(() => { copyAllBtn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i> COPY ALL NAMES'; lucide.createIcons(); }, 2000);
    };

    typeSelect.onchange(); // Init visibility
</script>
{% endblock %}
