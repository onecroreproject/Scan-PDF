{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- Result Area -->
        <div class="relative group">
            <div class="p-6 sm:p-8 rounded-2xl bg-surface-50 border-2 border-dashed border-brand-100 text-center transition-all group-hover:bg-brand-50/10 group-hover:border-brand-300">
                <div class="absolute top-3 right-3">
                    <button id="copy-btn" class="p-2.5 rounded-xl bg-white border border-surface-100 text-brand-600 hover:bg-brand-50 transition-all shadow-sm flex items-center gap-2 text-[10px] font-black uppercase tracking-wider">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                        Copy
                    </button>
                </div>
                <h4 class="text-[10px] font-black text-surface-400 uppercase tracking-[0.2em] mb-4">Secure Password</h4>
                <div id="password-display" class="text-2xl sm:text-3xl md:text-4xl font-mono font-black text-surface-900 break-all select-all tracking-wider">********</div>
            </div>
        </div>

        <!-- Settings Area -->
        <div class="space-y-4">
            <!-- Length Slider -->
            <div class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <label class="text-xs font-black text-surface-400 uppercase tracking-widest">Password Length</label>
                    <span id="length-val" class="px-3 py-1 rounded-lg bg-brand-50 text-brand-700 text-sm font-black font-mono shadow-sm border border-brand-100">16</span>
                </div>
                <div class="relative py-2">
                    <input type="range" id="length-range" min="8" max="64" value="16" 
                           class="w-full h-2 bg-surface-100 rounded-lg appearance-none cursor-pointer accent-brand-600">
                    <div class="flex justify-between mt-2 text-[10px] font-bold text-surface-300 uppercase tracking-tighter">
                        <span>Min (8)</span>
                        <span>Max (64)</span>
                    </div>
                </div>
            </div>

            <!-- Options Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <label class="flex items-center gap-4 p-4 rounded-xl border border-surface-100 bg-surface-50 cursor-pointer hover:bg-white hover:border-brand-500 hover:shadow-lg transition-all group">
                    <input type="checkbox" id="upper-check" checked class="w-5 h-5 rounded-md border-surface-300 text-brand-600 focus:ring-brand-500 transition-all">
                    <div class="min-w-0">
                        <p class="text-sm font-bold text-surface-700 group-hover:text-brand-600">Uppercase Letters</p>
                        <p class="text-[10px] text-surface-400 font-medium">Include A-Z</p>
                    </div>
                </label>
                <label class="flex items-center gap-4 p-4 rounded-xl border border-surface-100 bg-surface-50 cursor-pointer hover:bg-white hover:border-brand-500 hover:shadow-lg transition-all group">
                    <input type="checkbox" id="num-check" checked class="w-5 h-5 rounded-md border-surface-300 text-brand-600 focus:ring-brand-500 transition-all">
                    <div class="min-w-0">
                        <p class="text-sm font-bold text-surface-700 group-hover:text-brand-600">Numbers</p>
                        <p class="text-[10px] text-surface-400 font-medium">Include 0-9</p>
                    </div>
                </label>
                <label class="flex items-center gap-4 p-4 rounded-xl border border-surface-100 bg-surface-50 cursor-pointer hover:bg-white hover:border-brand-500 hover:shadow-lg transition-all group">
                    <input type="checkbox" id="sym-check" checked class="w-5 h-5 rounded-md border-surface-300 text-brand-600 focus:ring-brand-500 transition-all">
                    <div class="min-w-0">
                        <p class="text-sm font-bold text-surface-700 group-hover:text-brand-600">Symbols</p>
                        <p class="text-[10px] text-surface-400 font-medium">Include !@#$%^&*</p>
                    </div>
                </label>
                <label class="flex items-center gap-4 p-4 rounded-xl border border-surface-100 bg-surface-50 cursor-pointer hover:bg-white hover:border-brand-500 hover:shadow-lg transition-all group">
                    <input type="checkbox" id="lower-check" checked disabled class="w-5 h-5 rounded-md border-surface-300 text-brand-600 focus:ring-brand-500 transition-all checked:opacity-50">
                    <div class="min-w-0">
                        <p class="text-sm font-bold text-surface-700">Lowercase Letters</p>
                        <p class="text-[10px] text-surface-400 font-medium">Always Included (a-z)</p>
                    </div>
                </label>
            </div>

            <button id="generate-btn" class="w-full py-3 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-base uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:translate-y-0 transition-all flex items-center justify-center gap-3">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                Generate Password
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "password-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn');
    const disp = document.getElementById('password-display');
    const lengthRange = document.getElementById('length-range');
    const lengthVal = document.getElementById('length-val');
    const upperCheck = document.getElementById('upper-check');
    const numCheck = document.getElementById('num-check');
    const symCheck = document.getElementById('sym-check');
    const copyBtn = document.getElementById('copy-btn');

    lengthRange.addEventListener('input', () => { lengthVal.innerText = lengthRange.value; });

    const generate = async () => {
        btn.disabled = true;
        const originalText = btn.innerHTML;
        btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> SECURING...';
        try {
            const fd = new FormData();
            fd.append('length', lengthRange.value);
            fd.append('use_upper', upperCheck.checked);
            fd.append('use_nums', numCheck.checked);
            fd.append('use_syms', symCheck.checked);
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Failed');
            disp.innerText = d.result;
            disp.classList.add('animate-success-pop');
            setTimeout(() => disp.classList.remove('animate-success-pop'), 400);
        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
            lucide.createIcons();
        }
    };

    btn.addEventListener('click', generate);
    copyBtn.addEventListener('click', () => {
        if (disp.innerText === '********') return;
        navigator.clipboard.writeText(disp.innerText);
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> COPIED!';
        lucide.createIcons();
        setTimeout(() => { copyBtn.innerHTML = originalText; lucide.createIcons(); }, 2000);
    });

    // Auto-generate on load
    window.addEventListener('DOMContentLoaded', generate);
</script>
{% endblock %}
