{% extends 'converter/base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen pt-24 sm:pt-32 pb-12 sm:pb-20 relative">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50"></div>
    <div class="absolute top-1/4 left-[10%] w-[300px] h-[300px] bg-emerald-100/20 rounded-full blur-[80px]"></div>
    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <nav class="flex items-center gap-1.5 text-xs sm:text-sm mb-6 sm:mb-10">
            <a href="{% url 'converter:home' %}" class="text-surface-400 hover:text-brand-600 transition-colors flex items-center gap-1.5"><i data-lucide="home" class="w-3 h-3"></i> Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-surface-300"></i>
            <span class="text-surface-700 font-medium">Password Generator</span>
        </nav>
        <div class="mb-6 sm:mb-10 text-center">
            <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-700 flex items-center justify-center shadow-xl mx-auto mb-4 animate-float">
                <i data-lucide="lock" class="w-7 h-7 sm:w-8 sm:h-8 text-white"></i>
            </div>
            <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-surface-900 tracking-tight">Password Generator</h1>
            <p class="text-surface-500 text-xs sm:text-sm mt-1">Create secure, random passwords for your accounts.</p>
        </div>
        <div class="rounded-xl sm:rounded-2xl bg-white border border-surface-100 p-4 sm:p-6 md:p-8 shadow-card">
            <!-- Result Area -->
            <div class="mb-6 p-4 sm:p-5 rounded-2xl bg-surface-50 border-2 border-dashed border-surface-200">
                <div class="flex items-center justify-between gap-3 mb-2">
                    <span class="text-[10px] font-bold text-surface-400 uppercase tracking-widest">Generated Password</span>
                    <button id="copy-btn" class="p-1.5 rounded-lg hover:bg-emerald-50 text-emerald-600 transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                </div>
                <div id="password-display" class="text-xl sm:text-2xl font-mono font-bold text-surface-900 break-all min-h-[40px]">********</div>
            </div>

            <!-- Settings Area -->
            <div class="space-y-6">
                <div>
                    <div class="flex items-center justify-between mb-2.5">
                        <label class="text-sm font-semibold text-surface-700">Length</label>
                        <span id="length-val" class="px-2 py-0.5 rounded-lg bg-emerald-100 text-emerald-700 text-xs font-bold font-mono">16</span>
                    </div>
                    <input type="range" id="length-range" min="6" max="64" value="16" class="w-full h-2 rounded-lg bg-surface-100 accent-emerald-500 cursor-pointer appearance-none outline-none ring-offset-2 focus:ring-2 focus:ring-emerald-100">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <label class="flex items-center gap-3 p-3.5 rounded-xl border border-surface-200 cursor-pointer hover:bg-surface-50 transition-colors group">
                        <input type="checkbox" id="upper-check" checked class="w-4 h-4 rounded border-surface-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm font-medium text-surface-700 group-hover:text-surface-900">Uppercase Letters (A-Z)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3.5 rounded-xl border border-surface-200 cursor-pointer hover:bg-surface-50 transition-colors group">
                        <input type="checkbox" id="num-check" checked class="w-4 h-4 rounded border-surface-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm font-medium text-surface-700 group-hover:text-surface-900">Numbers (0-9)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3.5 rounded-xl border border-surface-200 cursor-pointer hover:bg-surface-50 transition-colors group">
                        <input type="checkbox" id="sym-check" checked class="w-4 h-4 rounded border-surface-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm font-medium text-surface-700 group-hover:text-surface-900">Symbols (!@#$%)</span>
                    </label>
                </div>

                <button id="generate-btn" class="w-full py-4 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 text-white font-bold text-sm tracking-wide shadow-lg shadow-emerald-500/20 hover:opacity-95 hover:shadow-xl hover:-translate-y-px active:translate-y-0 transition-all flex items-center justify-center gap-2.5">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> Generate Password
                </button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "password-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn');
    const disp = document.getElementById('password-display');
    const lengthRange = document.getElementById('length-range');
    const lengthVal = document.getElementById('length-val');
    const upperCheck = document.getElementById('upper-check');
    const numCheck = document.getElementById('num-check');
    const symCheck = document.getElementById('sym-check');
    const copyBtn = document.getElementById('copy-btn');

    lengthRange.addEventListener('input', () => { lengthVal.innerText = lengthRange.value; });

    const generate = async () => {
        btn.disabled = true;
        btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> Generating...';
        try {
            const fd = new FormData();
            fd.append('length', lengthRange.value);
            fd.append('use_upper', upperCheck.checked);
            fd.append('use_nums', numCheck.checked);
            fd.append('use_syms', symCheck.checked);
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || 'Failed');
            disp.innerText = d.result;
            disp.classList.add('animate-success-pop');
            setTimeout(() => disp.classList.remove('animate-success-pop'), 400);
        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="w-5 h-5"></i> Generate Password';
            lucide.createIcons();
        }
    };

    btn.addEventListener('click', generate);
    copyBtn.addEventListener('click', () => {
        if (disp.innerText === '********') return;
        navigator.clipboard.writeText(disp.innerText);
        const originalIcon = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>';
        lucide.createIcons();
        setTimeout(() => { copyBtn.innerHTML = originalIcon; lucide.createIcons(); }, 2000);
    });
</script>
{% endblock %}
