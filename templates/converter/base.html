{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="ScanPDF — Scan Smart. Share Fast. Convert Word, PowerPoint, Excel, HTML to PDF and back. Merge, split, compress PDFs. Fast, free, and secure.">
    <meta name="keywords"
        content="scan pdf, file converter, word to pdf, pptx to pdf, excel to pdf, pdf tools, merge pdf, split pdf, compress pdf, online converter">
    <meta name="author" content="ScanPDF">
    <meta name="theme-color" content="#7c3aed">
    <title>{{ page_title|default:"ScanPDF" }}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon.png' %}?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon.png' %}?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon.png' %}?v=3">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/favicon.png' %}?v=3">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#2e1065',
                        },
                        surface: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(124, 58, 237, 0.06)',
                        'card': '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04)',
                        'card-hover': '0 4px 12px rgba(0,0,0,0.06), 0 20px 48px rgba(0,0,0,0.06)',
                        'elevated': '0 20px 60px -12px rgba(0,0,0,0.10)',
                    },
                    screens: {
                        'xs': '475px',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>

<body class="bg-white text-surface-800 font-sans antialiased">

    <!-- ═══════════════ NAVBAR ═══════════════ -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-[80px] sm:h-[100px]">
                <!-- Logo -->
                <a href="{% url 'converter:home' %}" class="flex items-center gap-2 sm:gap-2.5 group flex-shrink-0"
                    aria-label="ScanPDF Home">
                    <img src="{% static 'images/logo.png' %}" alt="ScanPDF"
                        class="h-16 sm:h-20 md:h-24 w-auto object-contain">
                </a>

                <!-- Desktop Nav -->
                <div class="hidden md:flex items-center gap-1 lg:gap-2">
                    <a href="{% url 'converter:home' %}"
                        class="nav-link px-3 lg:px-4 py-2 rounded-lg text-sm font-medium text-surface-500 hover:text-brand-600 hover:bg-brand-50/50 transition-all duration-200">Home</a>
                    <a href="{% url 'converter:home' %}#tools"
                        class="nav-link px-3 lg:px-4 py-2 rounded-lg text-sm font-medium text-surface-500 hover:text-brand-600 hover:bg-brand-50/50 transition-all duration-200">Tools</a>
                    <a href="{% url 'converter:home' %}#how-it-works"
                        class="nav-link px-3 lg:px-4 py-2 rounded-lg text-sm font-medium text-surface-500 hover:text-brand-600 hover:bg-brand-50/50 transition-all duration-200">How
                        It Works</a>
                    <div class="w-px h-6 bg-surface-200 mx-1 lg:mx-2"></div>
                    <a href="{% url 'converter:home' %}#tools"
                        class="px-4 lg:px-5 py-2.5 rounded-xl bg-gradient-to-r from-brand-600 to-brand-700 text-white text-sm font-semibold hover:from-brand-500 hover:to-brand-600 transition-all duration-300 shadow-lg shadow-brand-600/20 hover:shadow-brand-500/30 hover:-translate-y-px active:translate-y-0">
                        Get Started
                    </a>
                </div>

                <!-- Mobile Hamburger -->
                <button id="mobile-menu-btn"
                    class="md:hidden p-2 rounded-xl hover:bg-surface-100 transition-colors text-surface-600"
                    aria-label="Toggle menu">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu"
            class="md:hidden hidden bg-white/98 backdrop-blur-2xl border-t border-surface-100 shadow-elevated">
            <div class="px-4 py-4 space-y-1">
                <a href="{% url 'converter:home' %}"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl text-surface-600 hover:text-brand-600 hover:bg-brand-50/60 transition-all text-sm">
                    <i data-lucide="home" class="w-4 h-4"></i>Home
                </a>
                <a href="{% url 'converter:home' %}#tools"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl text-surface-600 hover:text-brand-600 hover:bg-brand-50/60 transition-all text-sm">
                    <i data-lucide="wrench" class="w-4 h-4"></i>Tools
                </a>
                <a href="{% url 'converter:home' %}#how-it-works"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl text-surface-600 hover:text-brand-600 hover:bg-brand-50/60 transition-all text-sm">
                    <i data-lucide="info" class="w-4 h-4"></i>How It Works
                </a>
                <div class="pt-2">
                    <a href="{% url 'converter:home' %}#tools"
                        class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold text-sm shadow-lg shadow-brand-600/20">
                        <i data-lucide="zap" class="w-4 h-4"></i>Get Started
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <footer class="bg-surface-50 border-t border-surface-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="py-8 sm:py-12 grid grid-cols-1 gap-6 sm:grid-cols-3 sm:gap-8 items-center">
                <!-- Brand -->
                <div class="flex items-center gap-3 justify-center sm:justify-start">
                    <h1>DLK Software Solutions</h1>
                </div>

                <!-- Links -->
                <div class="flex items-center justify-center gap-4 sm:gap-6">

                </div>

                <!-- Copyright -->
                <p class="text-xs text-surface-400 text-center sm:text-right">
                    &copy; 2026 ScanPDF. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <!-- Core JS -->
    <script src="{% static 'js/main.js' %}"></script>
    <script>lucide.createIcons();</script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
