{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- URL Input -->
        <div class="space-y-4">
            <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Paste Video Link</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1 group">
                    <input type="text" id="url-input" 
                        placeholder="https://www.youtube.com/watch?v=..." 
                        class="w-full pl-12 pr-6 py-3 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 placeholder:text-surface-300">
                    <i data-lucide="link" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-300 group-focus-within:text-brand-500 transition-colors"></i>
                </div>
                <button id="fetch-btn" 
                    class="px-8 py-3 rounded-2xl bg-surface-900 text-white font-black text-sm uppercase tracking-widest hover:bg-black transition-all shadow-xl shadow-surface-900/10 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
                    <i data-lucide="search" class="w-4 h-4"></i>
                    Analyze
                </button>
            </div>
            <p class="text-[10px] text-surface-400 font-medium italic ml-1">Supports YouTube, Instagram Reels, and TikTok.</p>
        </div>

        <!-- Progress State -->
        <div id="progress-section" class="hidden">
            <div class="p-6 rounded-2xl bg-surface-50 border border-surface-100 flex items-center gap-5 animate-pulse">
                <div class="relative flex-shrink-0">
                    <div class="w-9 h-9 rounded-full border-[3px] border-surface-200 border-t-brand-500 animate-spin"></div>
                </div>
                <div>
                    <p id="progress-msg" class="text-sm font-black text-surface-800">Processing Link...</p>
                    <p class="text-[10px] text-surface-400 font-medium mt-0.5">Fetching media streams and formats.</p>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-section" class="hidden">
            <div class="p-5 rounded-2xl bg-red-50 border border-red-100 flex items-start gap-4 animate-shake">
                <div class="w-8 h-8 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                </div>
                <div class="pt-0.5">
                    <h4 class="text-xs font-black text-red-700 uppercase tracking-wider mb-1">Analysis Failed</h4>
                    <p id="error-message" class="text-xs text-red-500 font-bold leading-tight"></p>
                </div>
            </div>
        </div>

        <!-- Video Info & Formats (Initially Hidden) -->
        <div id="video-info" class="hidden space-y-4 animate-fade-in-up">
            <!-- Thumbnail & Title -->
            <div class="flex flex-col md:flex-row gap-6 p-6 rounded-2xl bg-surface-50 border border-surface-100">
                <div class="relative w-full md:w-56 h-32 flex-shrink-0 rounded-2xl overflow-hidden shadow-lg border-2 border-white">
                    <img id="thumb-img" referrerpolicy="no-referrer" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <div class="w-8 h-8 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center text-red-600">
                            <i data-lucide="play" class="w-5 h-5 fill-current ml-0.5"></i>
                        </div>
                    </div>
                </div>
                <div class="min-w-0 pt-1">
                    <h3 id="video-title" class="text-lg font-black text-surface-900 tracking-tight leading-snug line-clamp-2 mb-2"></h3>
                    <div id="video-uploader" class="flex items-center gap-2 text-xs font-bold text-surface-500">
                        <i data-lucide="user" class="w-3.5 h-3.5"></i>
                        <span></span>
                    </div>
                </div>
            </div>

            <!-- Formats List -->
            <div class="space-y-4">
                <h4 class="text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Available Download Options</h4>
                <div id="formats-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Format buttons injected here -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" tool_slug %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const urlInput = document.getElementById('url-input'), fetchBtn = document.getElementById('fetch-btn');
    const infoArea = document.getElementById('video-info'), progress = document.getElementById('progress-section');
    const errorSection = document.getElementById('error-section'), errMsg = document.getElementById('error-message');
    const thumb = document.getElementById('thumb-img'), title = document.getElementById('video-title'), uploader = document.getElementById('video-uploader'), formatsGrid = document.getElementById('formats-grid');

    const fetchInfo = async () => {
        const urlValue = urlInput.value.trim(); 
        if (!urlValue) return;

        progress.classList.remove('hidden'); 
        infoArea.classList.add('hidden'); 
        errorSection.classList.add('hidden');
        fetchBtn.disabled = true;

        try {
            const fd = new FormData(); 
            fd.append('url', urlValue); 
            fd.append('action', 'info'); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json(); 
            if (!r.ok) throw new Error(d.error || 'Failed to analyze link. Please check the URL.');

            thumb.src = d.result.thumbnail; 
            title.innerText = d.result.title; 
            uploader.querySelector('span').innerText = d.result.uploader;
            
            formatsGrid.innerHTML = ''; 
            d.result.formats.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'w-full px-5 py-4 rounded-2xl border-2 border-surface-100 bg-white text-left hover:border-brand-500 hover:shadow-lg transition-all group flex items-center justify-between';
                btn.innerHTML = `
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black bg-surface-100 text-surface-500 px-1.5 py-0.5 rounded uppercase">${f.ext}</span>
                            <span class="text-[10px] font-black text-brand-600 uppercase tracking-widest">${f.resolution || 'Auto'}</span>
                        </div>
                        <div class="text-xs font-bold text-surface-800 truncate">${f.note || 'Default Stream'}</div>
                    </div>
                    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-surface-50 flex items-center justify-center text-surface-300 group-hover:bg-brand-50 group-hover:text-brand-500 transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                `;
                btn.onclick = () => startDownload(f.format_id);
                formatsGrid.appendChild(btn);
            });
            
            infoArea.classList.remove('hidden');
            infoArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch (err) { 
            errMsg.innerText = err.message; 
            errorSection.classList.remove('hidden'); 
        } finally { 
            progress.classList.add('hidden'); 
            fetchBtn.disabled = false; 
            lucide.createIcons(); 
        }
    };

    const startDownload = async (fid) => {
        progress.classList.remove('hidden'); 
        document.getElementById('progress-msg').innerText = 'Downloading to server...';
        try {
            const fd = new FormData(); 
            fd.append('url', urlInput.value.trim()); 
            fd.append('action', 'download'); 
            fd.append('format_id', fid); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Download failed'); }
            
            const blob = await r.blob(); 
            const bUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = bUrl;
            
            const disp = r.headers.get('Content-Disposition'); 
            let fn = 'video.mp4';
            if (disp) { const m = disp.match(/filename="(.+?)"/); if (m) fn = m[1]; }
            
            a.download = fn; 
            a.click();
        } catch (err) { 
            alert(err.message); 
        } finally { 
            progress.classList.add('hidden'); 
            document.getElementById('progress-msg').innerText = 'Processing Link...'; 
            lucide.createIcons(); 
        }
    };

    fetchBtn.addEventListener('click', fetchInfo);
    urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchBtn.click(); });
</script>
{% endblock %}
