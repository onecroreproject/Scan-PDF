{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- Drag & Drop Zone -->
        <div id="drop-zone" class="relative rounded-2xl border-2 border-dashed border-brand-100 bg-brand-50/10 hover:bg-brand-50/30 hover:border-brand-400 transition-all duration-300 p-6 sm:p-8 md:p-10 text-center cursor-pointer group">
            
            <!-- Default State -->
            <div id="upload-default" class="space-y-4">
                <div class="w-14 h-14 rounded-2xl bg-surface-50 border border-surface-100 flex items-center justify-center mx-auto group-hover:bg-brand-50 group-hover:border-brand-200 group-hover:scale-105 transition-all duration-300">
                    <i data-lucide="image" class="w-8 h-8 text-surface-300 group-hover:text-brand-500 transition-colors"></i>
                </div>
                <div>
                    <p class="text-base font-semibold text-surface-700 mb-1">
                        Drop your background image here, or <span class="text-brand-600 underline underline-offset-4 decoration-brand-200">browse</span>
                    </p>
                    <p class="text-xs text-surface-400">Max 50MB&nbsp;&nbsp;•&nbsp;&nbsp;Accepted: .jpg, .png</p>
                </div>
            </div>

            <!-- File Selected State -->
            <div id="file-selected" class="hidden">
                <div class="flex items-center justify-center gap-6">
                    <div class="relative">
                        <img id="preview-img" class="w-24 h-24 rounded-2xl object-cover shadow-2xl border-4 border-white">
                        <div class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center text-white border-2 border-white shadow-lg">
                            <i data-lucide="check" class="w-3.5 h-3.5"></i>
                        </div>
                    </div>
                    <div class="text-left min-w-0">
                        <p id="file-name" class="text-surface-800 font-bold text-base truncate max-w-[180px]"></p>
                        <p id="file-size" class="text-xs text-surface-400 mt-0.5 font-medium"></p>
                    </div>
                    <button id="remove-file-btn" class="p-2.5 rounded-xl hover:bg-red-50 text-surface-300 hover:text-red-500 transition-all flex-shrink-0" title="Remove image">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <input type="file" id="file-input" class="hidden" accept=".jpg,.jpeg,.png">
        </div>

        <!-- Text Customization (Initially Hidden) -->
        <div id="meme-controls" class="hidden space-y-3 pt-4 border-t border-surface-50 animate-fade-in-up">
            <h3 class="text-sm font-black text-surface-400 uppercase tracking-widest text-center">Customize Text</h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-surface-500 uppercase tracking-wider ml-1">Top Caption</label>
                    <input type="text" id="top-text" placeholder="Something funny..." 
                        class="w-full px-5 py-4 rounded-xl bg-surface-50 border border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 placeholder:text-surface-300">
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-surface-500 uppercase tracking-wider ml-1">Bottom Caption</label>
                    <input type="text" id="bottom-text" placeholder="Punchline here..." 
                        class="w-full px-5 py-4 rounded-xl bg-surface-50 border border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 placeholder:text-surface-300">
                </div>
            </div>

            <button id="generate-btn" disabled 
                class="w-full py-3 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-sm sm:text-base uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3">
                <i data-lucide="laugh" class="w-5 h-5"></i>
                Create Meme
            </button>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden mt-10 p-6 sm:p-10 rounded-2xl bg-surface-50 border border-brand-100/50 shadow-inner animate-fade-in-up">
            <div class="relative group mb-10 mx-auto max-w-md">
                <div class="absolute -inset-4 bg-brand-500/10 rounded-2xl blur-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative rounded-2xl overflow-hidden shadow-2xl bg-white border-4 border-white transition-transform duration-500 group-hover:scale-[1.02]">
                    <img id="meme-img" class="w-full h-auto object-contain">
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a id="download-btn" href="#" download="meme.jpg" 
                   class="inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-black text-xs uppercase tracking-widest hover:from-emerald-400 hover:to-emerald-500 transition-all shadow-xl shadow-emerald-500/20">
                   <i data-lucide="download" class="w-5 h-5"></i> Download Meme
                </a>
                <button onclick="window.location.reload()" 
                   class="inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-white border border-surface-200 text-surface-600 font-black text-xs uppercase tracking-widest hover:bg-surface-50 transition-all">
                   <i data-lucide="refresh-cw" class="w-4 h-4"></i> Create New
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "meme-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const dropZone = document.getElementById('drop-zone'), fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img'), fileName = document.getElementById('file-name'), fileSize = document.getElementById('file-size');
    const uploadDefault = document.getElementById('upload-default'), fileSelected = document.getElementById('file-selected');
    const topText = document.getElementById('top-text'), bottomText = document.getElementById('bottom-text');
    const genBtn = document.getElementById('generate-btn'), resultArea = document.getElementById('result-section');
    const memeImg = document.getElementById('meme-img'), downloadLink = document.getElementById('download-btn');
    const memeControls = document.getElementById('meme-controls');

    let selectedFile = null;

    dropZone.onclick = e => { if (!e.target.closest('#remove-file-btn')) fileInput.click(); };
    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('border-brand-400', 'bg-brand-50/40'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('border-brand-400', 'bg-brand-50/40'); };
    dropZone.ondrop = e => { 
        e.preventDefault(); 
        dropZone.classList.remove('border-brand-400', 'bg-brand-50/40'); 
        if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); 
    };

    fileInput.onchange = e => { if(e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(f) {
        if (!f.type.startsWith('image/')) { alert('Please select an image file.'); return; }
        if (f.size > 52428800) { alert('File exceeds 50MB limit.'); return; }
        
        selectedFile = f; 
        fileName.innerText = f.name; 
        fileSize.innerText = (f.size / (1024 * 1024)).toFixed(2) + ' MB';
        
        const reader = new FileReader(); 
        reader.onload = e => { previewImg.src = e.target.result; }; 
        reader.readAsDataURL(f);
        
        uploadDefault.classList.add('hidden'); 
        fileSelected.classList.remove('hidden'); 
        memeControls.classList.remove('hidden');
        genBtn.disabled = false;
        lucide.createIcons();
    }

    document.getElementById('remove-file-btn').onclick = e => { 
        e.stopPropagation(); 
        selectedFile = null; 
        fileInput.value = ''; 
        uploadDefault.classList.remove('hidden'); 
        fileSelected.classList.add('hidden'); 
        memeControls.classList.add('hidden');
        genBtn.disabled = true; 
    };

    genBtn.onclick = async () => {
        if (!selectedFile) return; 
        genBtn.disabled = true; 
        const originalHtml = genBtn.innerHTML;
        genBtn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> RENDERING...';
        
        try {
            const fd = new FormData(); 
            fd.append('file', selectedFile); 
            fd.append('top_text', topText.value); 
            fd.append('bottom_text', bottomText.value); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Failed'); }
            
            const blob = await r.blob(); 
            const url = window.URL.createObjectURL(blob);
            
            memeImg.src = url; 
            downloadLink.href = url;
            resultArea.classList.remove('hidden'); 
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch(err) { 
            alert(err.message); 
        } finally { 
            genBtn.disabled = false; 
            genBtn.innerHTML = originalHtml; 
            lucide.createIcons(); 
        }
    };
</script>
{% endblock %}
