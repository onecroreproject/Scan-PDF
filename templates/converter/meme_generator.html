{% extends 'converter/base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen pt-24 sm:pt-32 pb-12 sm:pb-20 relative">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50"></div>
    <div class="absolute top-1/4 left-[10%] w-[300px] h-[300px] bg-yellow-100/20 rounded-full blur-[80px]"></div>
    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <nav class="flex items-center gap-1.5 text-xs sm:text-sm mb-6 sm:mb-10 text-center">
            <a href="{% url 'converter:home' %}" class="text-surface-400 hover:text-brand-600 transition-colors flex items-center gap-1.5"><i data-lucide="home" class="w-3 h-3"></i> Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-surface-300"></i>
            <span class="text-surface-700 font-medium">Meme Generator</span>
        </nav>
        <div class="mb-6 sm:mb-10 text-center">
            <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center shadow-xl mx-auto mb-4 animate-float">
                <i data-lucide="laugh" class="w-7 h-7 sm:w-8 sm:h-8 text-white"></i>
            </div>
            <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-surface-900 tracking-tight">Meme Generator</h1>
            <p class="text-surface-500 text-xs sm:text-sm mt-1">Create hilarious memes instantly by adding text to your images.</p>
        </div>
        <div class="rounded-xl sm:rounded-2xl bg-white border border-surface-100 p-4 sm:p-6 md:p-8 shadow-card space-y-6">
            <!-- Drop Zone -->
            <div id="drop-zone" class="relative rounded-xl border-2 border-dashed border-surface-200 hover:border-yellow-400 transition-all duration-300 p-8 sm:p-14 text-center cursor-pointer group bg-surface-50/50">
                <div id="upload-default" class="space-y-3">
                    <div class="w-16 h-16 rounded-2xl bg-white border border-surface-100 flex items-center justify-center mx-auto group-hover:scale-105 transition-all duration-300 shadow-sm"><i data-lucide="image" class="w-6 h-6 sm:w-8 sm:h-8 text-surface-200 group-hover:text-yellow-500 transition-colors"></i></div>
                    <div><p class="text-sm sm:text-base font-semibold text-surface-700 mb-1">Drop image here, or <span class="text-yellow-600 underline underline-offset-4 decoration-yellow-200">browse</span></p><p class="text-[10px] sm:text-xs text-surface-400">JPG, PNG (Max 50MB)</p></div>
                </div>
                <div id="file-selected" class="hidden">
                    <div class="flex items-center justify-center gap-4">
                        <img id="preview-img" class="w-16 h-16 rounded-lg object-cover shadow-md border-2 border-white">
                        <div class="text-left"><p id="file-name" class="text-surface-800 font-semibold text-sm truncate max-w-[150px]"></p><p id="file-size" class="text-[10px] text-surface-400"></p></div>
                        <button id="remove-file-btn" class="p-2 rounded-lg hover:bg-red-50 text-surface-300 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <input type="file" id="file-input" class="hidden" accept=".jpg,.jpeg,.png">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-surface-400 uppercase tracking-widest ml-1">Top Text</label>
                    <input type="text" id="top-text" placeholder="Enter top text..." class="w-full px-4 py-3 rounded-xl border border-surface-200 bg-surface-50 text-sm focus:border-yellow-400 focus:bg-white outline-none transition-all font-semibold">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-surface-400 uppercase tracking-widest ml-1">Bottom Text</label>
                    <input type="text" id="bottom-text" placeholder="Enter bottom text..." class="w-full px-4 py-3 rounded-xl border border-surface-200 bg-surface-50 text-sm focus:border-yellow-400 focus:bg-white outline-none transition-all font-semibold">
                </div>
            </div>

            <button id="generate-btn" disabled class="w-full py-4 rounded-xl bg-gradient-to-r from-yellow-400 to-yellow-600 text-white font-bold text-sm shadow-xl shadow-yellow-500/20 hover:opacity-95 hover:-translate-y-px active:translate-y-0 transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center gap-3">
                <i data-lucide="rocket" class="w-5 h-5"></i> CREATE MEME
            </button>
        </div>

        <div id="result-section" class="hidden mt-10 p-6 sm:p-10 rounded-2xl sm:rounded-3xl bg-white border border-yellow-100 shadow-card animate-fade-in-up">
            <div class="w-full rounded-xl overflow-hidden shadow-2xl bg-surface-50 mb-8 border-4 border-white">
                <img id="meme-img" class="w-full h-auto object-contain shadow-inner">
            </div>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a id="download-btn" href="#" download="meme.jpg" class="px-8 py-4 rounded-2xl bg-yellow-500 text-white font-bold text-sm hover:bg-yellow-600 transition-all flex items-center justify-center gap-2 shadow-lg shadow-yellow-500/30"><i data-lucide="download" class="w-5 h-5"></i> DOWNLOAD MEME</a>
                <button onclick="window.location.reload()" class="px-8 py-4 rounded-2xl bg-surface-50 text-surface-600 font-bold text-sm hover:bg-surface-100 transition-all flex items-center justify-center gap-2"><i data-lucide="refresh-cw" class="w-5 h-5"></i> START OVER</button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "meme-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const dropZone = document.getElementById('drop-zone'), fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img'), fileName = document.getElementById('file-name'), fileSize = document.getElementById('file-size');
    const uploadDefault = document.getElementById('upload-default'), fileSelected = document.getElementById('file-selected');
    const topText = document.getElementById('top-text'), bottomText = document.getElementById('bottom-text');
    const genBtn = document.getElementById('generate-btn'), resultArea = document.getElementById('result-section');
    const memeImg = document.getElementById('meme-img'), download = document.getElementById('download-btn');
    let selectedFile = null;

    dropZone.onclick = e => { if(!e.target.closest('#remove-file-btn')) fileInput.click(); };
    fileInput.onchange = e => { if(e.target.files.length) handleFile(e.target.files[0]); };

    function handleFile(f) {
        selectedFile = f; fileName.innerText = f.name; fileSize.innerText = (f.size / (1024 * 1024)).toFixed(2) + ' MB';
        const reader = new FileReader(); reader.onload = e => { previewImg.src = e.target.result; }; reader.readAsDataURL(f);
        uploadDefault.classList.add('hidden'); fileSelected.classList.remove('hidden'); genBtn.disabled = false;
        lucide.createIcons();
    }

    document.getElementById('remove-file-btn').onclick = e => { e.stopPropagation(); selectedFile = null; fileInput.value = ''; uploadDefault.classList.remove('hidden'); fileSelected.classList.add('hidden'); genBtn.disabled = true; };

    genBtn.onclick = async () => {
        if (!selectedFile) return; genBtn.disabled = true; genBtn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> Processing...';
        try {
            const fd = new FormData(); fd.append('file', selectedFile); fd.append('top_text', topText.value); fd.append('bottom_text', bottomText.value); fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Failed'); }
            const blob = await r.blob(); const url = window.URL.createObjectURL(blob);
            memeImg.src = url; download.href = url;
            resultArea.classList.remove('hidden'); resultArea.scrollIntoView({ behavior: 'smooth' });
        } catch(err) { alert(err.message); }
        finally { genBtn.disabled = false; genBtn.innerHTML = '<i data-lucide="rocket" class="w-5 h-5"></i> CREATE MEME'; lucide.createIcons(); }
    };
</script>
{% endblock %}
