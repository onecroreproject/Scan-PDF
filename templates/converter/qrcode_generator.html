{% extends 'converter/base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen pt-24 sm:pt-32 pb-12 sm:pb-20 relative">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-gray-100/30 rounded-full blur-[120px]"></div>
    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <nav class="flex items-center justify-center gap-1.5 text-xs sm:text-sm mb-6 sm:mb-10 text-center">
            <a href="{% url 'converter:home' %}" class="text-surface-400 hover:text-brand-600 transition-colors flex items-center gap-1.5"><i data-lucide="home" class="w-3 h-3"></i> Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-surface-300"></i>
            <span class="text-surface-700 font-medium tracking-tight">QR Code Generator</span>
        </nav>
        <div class="mb-10 sm:mb-16">
            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl sm:rounded-[2rem] bg-surface-900 flex items-center justify-center shadow-2xl mx-auto mb-6 transform hover:rotate-6 transition-all duration-300 group">
                <i data-lucide="qr-code" class="w-8 h-8 sm:w-10 sm:h-10 text-white group-hover:scale-110 transition-transform"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-surface-900 tracking-tight">QR Code Generator</h1>
            <p class="text-surface-500 text-xs sm:text-sm mt-2 max-w-sm mx-auto">Generate custom QR codes for links, text, or any data you want to share.</p>
        </div>
        <div class="rounded-2xl sm:rounded-3xl bg-white border border-surface-100 p-6 sm:p-10 shadow-card max-w-lg mx-auto">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-surface-400 uppercase tracking-widest text-left ml-1">Your Content</label>
                    <div class="relative group">
                        <textarea id="qr-input" placeholder="Type your URL or text here..." class="w-full px-5 py-4 rounded-2xl border-2 border-surface-100 text-sm font-semibold focus:border-surface-900 focus:bg-white outline-none transition-all min-h-[120px] resize-none"></textarea>
                        <div class="absolute bottom-4 right-4 text-surface-300 pointer-events-none group-focus-within:text-surface-600 transition-colors"><i data-lucide="type" class="w-5 h-5"></i></div>
                    </div>
                </div>
                <button id="generate-btn" class="w-full py-4.5 rounded-2xl bg-surface-900 text-white font-bold text-sm tracking-wide shadow-xl hover:bg-black hover:-translate-y-px active:translate-y-0 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> GENERATE QR CODE
                </button>
            </div>

            <!-- Result Area -->
            <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50">
                <div class="w-48 h-48 sm:w-56 sm:h-56 mx-auto rounded-3xl bg-surface-50 p-4 border-2 border-surface-100 shadow-inner group">
                    <img id="qr-img" src="" class="w-full h-full object-contain mix-blend-multiply group-hover:scale-[1.05] transition-transform duration-500">
                </div>
                <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
                    <a id="download-btn" href="#" download="qrcode.png" class="px-8 py-3.5 rounded-2xl bg-surface-900 text-white font-bold text-xs hover:bg-black transition-all flex items-center justify-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> DOWNLOAD PNG</a>
                    <button onclick="window.location.reload()" class="px-8 py-3.5 rounded-2xl bg-surface-100 text-surface-700 font-bold text-xs hover:bg-surface-200 transition-all flex items-center justify-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> CREATE NEW</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "qrcode-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), input = document.getElementById('qr-input');
    const result = document.getElementById('result-area'), img = document.getElementById('qr-img'), download = document.getElementById('download-btn');

    btn.addEventListener('click', async () => {
        const val = input.value.trim(); if (!val) return;
        btn.disabled = true; btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> Generating...';
        
        try {
            const fd = new FormData(); fd.append('text', val); fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Failed'); }
            const blob = await r.blob(); const url = window.URL.createObjectURL(blob);
            img.src = url; download.href = url;
            result.classList.remove('hidden');
            result.scrollIntoView({ behavior: 'smooth' });
        } catch(err) { alert(err.message); }
        finally { btn.disabled = false; btn.innerHTML = '<i data-lucide="sparkles" class="w-5 h-5"></i> GENERATE QR CODE'; lucide.createIcons(); }
    });
</script>
{% endblock %}
