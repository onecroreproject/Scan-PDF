{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- Input Section -->
        <div class="space-y-3">
            <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Content for QR Code</label>
            <div class="relative group">
                <textarea id="qr-input" 
                    placeholder="Enter URL, text, or any data here..." 
                    class="w-full px-6 py-3 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 placeholder:text-surface-300 min-h-[140px] resize-none"></textarea>
                <div class="absolute right-4 bottom-4 text-surface-200 group-focus-within:text-brand-500 transition-colors">
                    <i data-lucide="type" class="w-6 h-6"></i>
                </div>
            </div>
            <p class="text-[10px] text-surface-400 font-medium italic ml-1">Max 2,000 characters. Perfect for links, Wi-Fi, or simple text.</p>
        </div>

        <button id="generate-btn" 
            class="w-full py-3 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-base uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
            Generate QR Code
        </button>

        <!-- Result Area (Initially Hidden) -->
        <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50 animate-fade-in-up">
            <div class="flex flex-col items-center gap-4">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-gradient-to-tr from-brand-500/10 to-purple-500/10 rounded-2xl blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    <div class="relative w-56 h-56 sm:w-64 sm:h-64 rounded-xl bg-white p-6 border border-surface-100 shadow-2xl group-hover:scale-[1.02] transition-transform duration-500">
                        <img id="qr-img" src="" class="w-full h-full object-contain select-none pointer-events-none">
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 w-full justify-center">
                    <a id="download-btn" href="#" download="qrcode.png" 
                       class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-surface-900 text-white font-black text-xs uppercase tracking-widest hover:bg-black transition-all shadow-xl shadow-surface-900/10">
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Download PNG
                    </a>
                    <button onclick="window.location.reload()" 
                       class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-surface-50 border border-surface-100 text-surface-600 font-black text-xs uppercase tracking-widest hover:bg-surface-100 transition-all">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Create New
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "qrcode-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), input = document.getElementById('qr-input');
    const result = document.getElementById('result-area'), img = document.getElementById('qr-img'), download = document.getElementById('download-btn');

    btn.addEventListener('click', async () => {
        const val = input.value.trim(); 
        if (!val) return;
        
        btn.disabled = true; 
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> GENERATING...';
        
        try {
            const fd = new FormData(); 
            fd.append('text', val); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            if (!r.ok) { const d = await r.json(); throw new Error(d.error || 'Failed'); }
            
            const blob = await r.blob(); 
            const url = window.URL.createObjectURL(blob);
            
            img.src = url; 
            download.href = url;
            result.classList.remove('hidden');
            result.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch(err) { 
            alert(err.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = originalHtml; 
            lucide.createIcons(); 
        }
    });

    // Handle CTRL+ENTER to generate
    input.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') btn.click();
    });
</script>
{% endblock %}
