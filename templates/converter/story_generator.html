{% extends 'converter/base.html' %}
{% load static %}
{% block content %}
<section class="min-h-screen pt-24 sm:pt-32 pb-12 sm:pb-20 relative">
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50"></div>
    <div class="absolute -top-32 -left-32 w-[500px] h-[500px] bg-green-100/30 rounded-full blur-[100px]"></div>
    <div class="relative z-10 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <nav class="flex items-center gap-1.5 text-xs sm:text-sm mb-6 sm:mb-10 text-center">
            <a href="{% url 'converter:home' %}" class="text-surface-400 hover:text-brand-600 transition-colors flex items-center gap-1.5"><i data-lucide="home" class="w-3 h-3"></i> Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3 text-surface-300"></i>
            <span class="text-surface-700 font-medium tracking-tight">Story Generator</span>
        </nav>
        <div class="mb-6 sm:mb-10 text-center">
            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl sm:rounded-3xl bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center shadow-xl mx-auto mb-6 animate-float">
                <i data-lucide="book-open" class="w-8 h-8 sm:w-10 sm:h-10 text-white shadow-sm"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-surface-900 tracking-tight">AI Story Generator</h1>
            <p class="text-surface-500 text-xs sm:text-sm mt-2 max-w-sm mx-auto">Create unique, creative stories instantly across multiple genres.</p>
        </div>
        <div class="rounded-2xl sm:rounded-3xl bg-white border border-surface-100 p-6 sm:p-10 shadow-card max-w-lg mx-auto overflow-hidden">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-surface-400 uppercase tracking-widest text-left ml-1">Select Genre</label>
                    <div class="relative group">
                        <select id="genre-select" class="w-full px-5 py-4 rounded-2xl border-2 border-surface-100 text-sm font-bold bg-surface-50 appearance-none focus:border-green-400 focus:bg-white outline-none transition-all cursor-pointer">
                            <option value="science fiction">Science Fiction 🚀</option>
                            <option value="fantasy">High Fantasy ⚔️</option>
                            <option value="mystery">Noir Mystery 🔍</option>
                            <option value="horror">True Horror 👻</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 text-surface-400 pointer-events-none group-focus-within:text-green-500 transition-colors"><i data-lucide="chevron-down" class="w-5 h-5"></i></div>
                    </div>
                </div>
                <button id="generate-btn" class="w-full py-4.5 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold text-sm tracking-wide shadow-xl shadow-green-500/20 hover:opacity-95 hover:scale-[1.01] active:translate-y-0 hover:-translate-y-px transition-all flex items-center justify-center gap-3">
                    <i data-lucide="sparkles" class="w-5 h-5 text-white/50"></i> GENERATE STORY
                </button>
            </div>

            <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50 animate-fade-in-up">
                <div class="relative p-6 sm:p-8 rounded-3xl bg-surface-50 border-2 border-surface-100 shadow-inner group">
                    <div class="absolute -top-4 left-6 px-3 py-1 rounded-full bg-green-500 text-[10px] font-bold text-white uppercase tracking-widest flex items-center gap-1.5"><i data-lucide="star" class="w-3 h-3"></i> GENERATED</div>
                    <div id="story-text" class="text-sm sm:text-base text-surface-800 leading-relaxed italic font-serif opacity-90 first-letter:text-3xl first-letter:font-bold first-letter:float-left first-letter:mr-2 first-letter:text-green-600"></div>
                </div>
                <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
                    <button id="copy-btn" class="px-6 py-3.5 rounded-2xl bg-green-500 text-white font-bold text-xs hover:bg-green-600 transition-all flex items-center justify-center gap-2"><i data-lucide="copy" class="w-4 h-4"></i> COPY STORY</button>
                    <button id="reset-btn" class="px-6 py-3.5 rounded-2xl bg-surface-100 text-surface-600 font-bold text-xs hover:bg-surface-200 transition-all flex items-center justify-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4"></i> NEW STORY</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "story-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), select = document.getElementById('genre-select');
    const result = document.getElementById('result-area'), textEl = document.getElementById('story-text');
    const copyBtn = document.getElementById('copy-btn'), resetBtn = document.getElementById('reset-btn');

    btn.addEventListener('click', async () => {
        btn.disabled = true; btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> Weaving tale...';
        try {
            const fd = new FormData(); fd.append('genre', select.value); fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json(); if (!r.ok) throw new Error(d.error || 'Failed');
            textEl.innerText = d.result; result.classList.remove('hidden'); result.scrollIntoView({ behavior: 'smooth' });
        } catch(err) { alert(err.message); }
        finally { btn.disabled = false; btn.innerHTML = '<i data-lucide="sparkles" class="w-5 h-5 text-white/50"></i> GENERATE STORY'; lucide.createIcons(); }
    });

    copyBtn.onclick = () => { navigator.clipboard.writeText(textEl.innerText); copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> COPIED!'; setTimeout(() => { copyBtn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i> COPY STORY'; lucide.createIcons(); }, 2000); lucide.createIcons(); };
    resetBtn.onclick = () => { result.classList.add('hidden'); btn.click(); };
</script>
{% endblock %}
