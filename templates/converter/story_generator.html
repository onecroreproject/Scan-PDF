{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-4">
        <!-- Input Section -->
        <div class="space-y-3">
            <div class="space-y-3">
                <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Select Genre</label>
                <div class="relative group">
                    <select id="genre-select" 
                        class="w-full px-6 py-4.5 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 appearance-none cursor-pointer">
                        <option value="science fiction">Science Fiction 🚀</option>
                        <option value="fantasy">High Fantasy ⚔️</option>
                        <option value="mystery">Noir Mystery 🔍</option>
                        <option value="horror">True Horror 👻</option>
                        <option value="romance">Sweet Romance ❤️</option>
                        <option value="adventure">Epic Adventure 🗺️</option>
                    </select>
                    <div class="absolute right-6 top-1/2 -translate-y-1/2 text-surface-300 group-hover:text-brand-500 transition-colors pointer-events-none">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-[11px] font-black text-surface-400 uppercase tracking-widest ml-1">Custom Ideas (Optional)</label>
                <div class="relative group">
                    <textarea id="story-prompt" 
                        placeholder="e.g., 'A story about a lost robot in a desert' or 'Include a secret map'..." 
                        class="w-full px-6 py-3 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 outline-none transition-all text-sm font-bold text-surface-900 placeholder:text-surface-300 min-h-[140px] resize-none"></textarea>
                    <div class="absolute right-4 bottom-4 text-surface-200 group-focus-within:text-brand-500 transition-colors">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                    </div>
                </div>
                <p class="text-[10px] text-surface-400 font-medium italic ml-1">Provide a seed idea and watch Gemini AI weave a unique tale.</p>
            </div>
        </div>

        <button id="generate-btn" 
            class="w-full py-3 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-base uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-3">
            <i data-lucide="wand-2" class="w-5 h-5"></i>
            Generate Story
        </button>

        <!-- Result Area (Initially Hidden) -->
        <div id="result-area" class="hidden mt-10 pt-10 border-t-2 border-dashed border-surface-50 animate-fade-in-up">
            <div class="relative group">
                <div class="absolute -inset-4 bg-emerald-500/5 rounded-2xl blur-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative p-8 sm:p-12 rounded-2xl bg-surface-50 border-2 border-surface-100 shadow-inner overflow-hidden">
                    <div class="absolute top-0 right-0 p-4">
                        <button id="copy-btn" class="p-2.5 rounded-xl bg-white border border-surface-100 text-brand-600 hover:bg-brand-50 transition-all shadow-sm flex items-center gap-2 text-[10px] font-black uppercase tracking-wider">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            Copy Story
                        </button>
                    </div>
                    
                    <div id="story-text" class="text-base sm:text-lg text-surface-800 leading-relaxed font-serif first-letter:text-5xl first-letter:font-black first-letter:float-left first-letter:mr-3 first-letter:text-brand-600 first-letter:mt-1">
                        <!-- Story content injected here -->
                    </div>
                </div>
            </div>

            <div class="mt-10 flex flex-col sm:flex-row gap-3 justify-center">
                <button id="reset-btn" 
                   class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-surface-900 text-white font-black text-xs uppercase tracking-widest hover:bg-black transition-all shadow-xl shadow-surface-900/10">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    New Story
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "story-generator" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('generate-btn'), select = document.getElementById('genre-select');
    const result = document.getElementById('result-area'), textEl = document.getElementById('story-text');
    const copyBtn = document.getElementById('copy-btn'), resetBtn = document.getElementById('reset-btn');

    btn.addEventListener('click', async () => {
        const prompt = document.getElementById('story-prompt').value.trim();
        btn.disabled = true; 
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<div class="w-5 h-5 rounded-full border-2 border-white border-t-transparent animate-spin"></div> WEAVING TALE...';
        
        try {
            const fd = new FormData(); 
            fd.append('genre', select.value); 
            fd.append('prompt', prompt); 
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            const d = await r.json(); 
            if (!r.ok) throw new Error(d.error || 'Failed to weave story.');
            
            // Format story for a nice drop-cap effect
            textEl.innerHTML = d.result; 
            result.classList.remove('hidden'); 
            result.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch(err) { 
            alert(err.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = originalHtml; 
            lucide.createIcons(); 
        }
    });

    copyBtn.onclick = () => { 
        navigator.clipboard.writeText(textEl.innerText); 
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> COPIED!'; 
        lucide.createIcons(); 
        setTimeout(() => { copyBtn.innerHTML = originalText; lucide.createIcons(); }, 2000); 
    };

    resetBtn.onclick = () => { 
        document.getElementById('story-prompt').value = '';
        result.classList.add('hidden'); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
</script>
{% endblock %}
