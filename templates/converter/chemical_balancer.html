{% extends 'converter/tool_base.html' %}
{% load static %}

{% block tool_content %}
<div class="rounded-2xl bg-white border border-surface-100 p-4 sm:p-5 shadow-mega">
    <div class="space-y-3">
        <!-- Input Area -->
        <div class="space-y-3 text-center">
            <label class="text-sm font-black text-surface-400 uppercase tracking-widest">Enter Unbalanced Equation</label>
            <div class="relative group">
                <input type="text" id="equation-input" 
                    placeholder="e.g. H2 + O2 = H2O"
                    class="w-full px-6 py-3 rounded-2xl bg-surface-50 border-2 border-surface-100 focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-500/5 outline-none transition-all text-lg font-bold text-surface-900 placeholder:text-surface-300">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
                    <kbd class="px-2 py-1 rounded bg-surface-100 border border-surface-200 text-[10px] font-black text-surface-400">ENTER</kbd>
                </div>
            </div>
            <p class="text-[11px] text-surface-400 font-medium">Use uppercase symbols and numbers (e.g., NaCl, H2SO4).</p>
        </div>

        <button id="balance-btn"
            class="w-full py-4 sm:py-4 rounded-2xl bg-gradient-to-r {{ tool.gradient }} text-white font-black text-sm sm:text-base uppercase tracking-widest transition-all shadow-xl shadow-brand-500/20 hover:shadow-brand-500/40 hover:-translate-y-1 active:translate-y-0 flex items-center justify-center gap-3">
            <i data-lucide="beaker" class="w-5 h-5"></i>
            Balance Equation
        </button>

        <!-- Progress State -->
        <div id="progress-section" class="hidden animate-pulse">
            <div class="flex items-center justify-center gap-3 py-4 rounded-xl bg-surface-50 border border-surface-100 italic text-sm text-surface-500">
                <div class="w-4 h-4 rounded-full border-2 border-brand-500 border-t-transparent animate-spin"></div>
                Calculating stoichiometry...
            </div>
        </div>

        <!-- Result Section -->
        <div id="result-section" class="hidden space-y-4 animate-fade-in-up">
            <div class="p-6 rounded-2xl bg-brand-50 border border-brand-100 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2">
                    <button id="copy-btn" class="p-2 rounded-lg bg-white border border-brand-100 text-brand-600 hover:bg-brand-50 transition-all shadow-sm flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy
                    </button>
                </div>
                <h4 class="text-[10px] font-black text-brand-600 uppercase tracking-[0.2em] mb-3">Balanced Result</h4>
                <div id="result-text" class="text-xl sm:text-2xl md:text-3xl font-black text-surface-900 tracking-tight leading-relaxed"></div>
            </div>
        </div>

        <!-- Error Section -->
        <div id="error-section" class="hidden">
            <div class="p-5 rounded-2xl bg-red-50 border border-red-100 flex items-start gap-4 animate-shake">
                <div class="w-9 h-9 rounded-xl bg-red-100 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
                </div>
                <div class="min-w-0 pt-1">
                    <h4 class="font-black text-red-700 text-sm uppercase tracking-wider mb-1">Calculation Error</h4>
                    <p id="error-message" class="text-xs text-red-500 leading-relaxed font-semibold"></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    const CONVERT_URL = '{% url "converter:convert_file" "chemical-balancer" %}';
    const CSRF_TOKEN = '{{ csrf_token }}';
    const btn = document.getElementById('balance-btn');
    const input = document.getElementById('equation-input');
    const progress = document.getElementById('progress-section');
    const result = document.getElementById('result-section');
    const resultText = document.getElementById('result-text');
    const error = document.getElementById('error-section');
    const errorMsg = document.getElementById('error-message');
    const copyBtn = document.getElementById('copy-btn');

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btn.click();
    });

    btn.addEventListener('click', async () => {
        const val = input.value.trim();
        if (!val) return;
        
        btn.disabled = true;
        progress.classList.remove('hidden');
        result.classList.add('hidden');
        error.classList.add('hidden');

        try {
            const fd = new FormData();
            fd.append('equation', val);
            fd.append('csrfmiddlewaretoken', CSRF_TOKEN);
            
            const r = await fetch(CONVERT_URL, { method: 'POST', body: fd });
            
            let d;
            try {
                d = await r.json();
            } catch (jsonErr) {
                if (!r.ok) throw new Error(`Server Error (${r.status}): Failed to calculate stoichiometry.`);
                throw new Error("Invalid response from server.");
            }
            
            if (!r.ok) throw new Error(d.error || 'Failed to balance equation.');
            
            resultText.innerHTML = d.result;
            result.classList.remove('hidden');
            lucide.createIcons();
        } catch (err) {
            errorMsg.innerText = err.message;
            error.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            progress.classList.add('hidden');
            lucide.createIcons();
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(resultText.innerText);
        const original = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!';
        lucide.createIcons();
        setTimeout(() => { copyBtn.innerHTML = original; lucide.createIcons(); }, 2000);
    });
</script>
{% endblock %}
