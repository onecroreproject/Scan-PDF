{% extends 'converter/base.html' %}
{% load static %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center relative overflow-hidden px-4">
    <!-- Background Accents -->
    <div class="absolute inset-0 bg-gradient-to-b from-surface-50 via-white to-surface-50 -z-10"></div>
    <div
        class="absolute top-1/4 left-[10%] w-[300px] h-[300px] bg-brand-100/20 rounded-full blur-[100px] -z-10 animate-pulse-slow">
    </div>
    <div
        class="absolute bottom-1/4 right-[10%] w-[250px] h-[250px] bg-purple-100/20 rounded-full blur-[100px] -z-10 animate-pulse-slow-delayed">
    </div>

    <div class="max-w-xl w-full text-center relative z-10 animate-fade-in-up">
        <!-- 500 Visual -->
        <div class="relative mb-8">
            <h1
                class="text-[120px] sm:text-[180px] font-black leading-none bg-gradient-to-br from-red-600 to-red-100 bg-clip-text text-transparent opacity-20 select-none">
                500</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <div
                    class="w-20 h-20 rounded-[2rem] bg-red-600 flex items-center justify-center shadow-xl shadow-red-500/30 animate-shake">
                    <i data-lucide="server-crash" class="w-10 h-10 text-white"></i>
                </div>
            </div>
        </div>

        <!-- Text Content -->
        <h2 class="text-3xl sm:text-4xl font-black text-surface-900 mb-4 tracking-tight">System Hiccup!</h2>
        <p class="text-surface-500 text-base sm:text-lg mb-10 leading-relaxed font-light px-4">
            Our server encountered an unexpected error. Don't worry, our developers have been notified and are already
            looking into it.
        </p>

        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 px-6">
            <a href="{% url 'converter:home' %}"
                class="w-full sm:w-auto inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-gradient-to-r from-brand-600 to-brand-700 text-white font-black text-sm hover:from-brand-500 hover:to-brand-600 transition-all shadow-xl shadow-brand-500/20 hover:-translate-y-1 active:scale-95">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                Try Again
            </a>
            <a href="{% url 'converter:home' %}"
                class="w-full sm:w-auto inline-flex items-center justify-center gap-2.5 px-8 py-4 rounded-2xl bg-white border border-surface-200 text-surface-600 font-bold text-sm hover:bg-surface-50 transition-all shadow-sm active:scale-95">
                <i data-lucide="home" class="w-4 h-4"></i>
                Go Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
